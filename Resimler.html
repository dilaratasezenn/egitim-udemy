<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF=8" />
    <!--burada utf-8 yazması türkçe karakterleri kullanacağımızı belirtmek için-->
    <meta name="viewprt" content="width=device-width, initial-scale=1.0" />
    <!--viewport kısmı html dosyamızın tarayıcıda nasıl görünüceğini demek device-width html dosyasını açan cihazın genişliği ile aynı olsun demek-->
    <title>HTML dersleri - resimler</title>
  </head>
  <body>
    <img
      src="https://www.galerisoyut.com.tr/uploads/images/202504/original_2.webp"
      alt="resim yüklenemedi"
      width="400"
      height="300"
    /><!--src içine resmin yolu verilir alt ile bu resmin açıklaması yazılır yada olurda resim yüklenmezse alt içine yazdığımız yazı gözükür örneğin resim yüklenemedi width height ile resmin büyüklüğünü sayfada değiştirebiliriz-->
    <img
      src="img/vangogh.webp"
      alt="yıldızlı gece yüklenemedi"
      width="400"
      height="300"
    /><!--dosya içinden img seçildi-->
  </body>
</html>
