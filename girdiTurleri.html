<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF=8" />
    <!--burada utf-8 yazması türkçe karakterleri kullanacağımızı belirtmek için-->
    <meta name="viewprt" content="width=device-width, initial-scale=1.0" />
    <!--viewport kısmı html dosyamızın tarayıcıda nasıl görünüceğini demek device-width html dosyasını açan cihazın genişliği ile aynı olsun demek-->
    <title>HTML dersleri-girdi türleri</title>
  </head>
  <body>
    <input type="text" /><br /><br />
    <input type="button" value="button" /><br /><br />
    <input type="checkbox" name="sozlesme" id="sozlesme" />
    <label for="sozlesme">Kabul ediyorum</label
    ><br /><br /><!--ben burada kabul ediyorum yazısına tıkladığımda chechbox kutusu tik olsun istersem label içinde for kullanıcam for içine sözleşme yazdım checkbox kutusunu yazdığum input içine birde name ekleyip for a yazdığım aynı şeyi yazıyorum bu şekilde yazıya tıkladığımda da tik olmuş olucak id de verdim inputa aynı şeyi yazdım-->
    <input type="date" /><br /><br />
    <input type="email" /><br /><br />
    <input type="file" /><br /><br />
    <input
      type="hidden"
    /><br /><br /><!--gizli input yani giriş sayfada incpect yaparak bulunabilir-->
    <input type="image" /><br /><br />
    <input type="number" /><br /><br />
    <input type="password" /><br /><br />
    <label for="">seçim 1</label>
    <input type="radio" name="secim" />
    <label for="">seçim 2</label>
    <input
      type="radio"
      name="secim"
    /><br /><br /><!--radio ile herhangi birşeylerin arasında seçim yapmak için kullanılır yuvarlak işaretleme gibi name secim ile ikisinden birini seçmek zorunda bıraktık bişey yapmasak ikiside seçilir-->
    <input
      type="range"
    /><br /><br /><!--ses kısma tuşu gibi düşün ileri geri sürükleyerek -->
    <input
      type="submit"
    /><!--zaten görmüştük isim soy isim gibi şeyler doldurduk-->
  </body>
</html>
