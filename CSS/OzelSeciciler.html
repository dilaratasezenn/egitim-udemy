    <style>
      /*
      p:first-child {
        first child ile paragrafın ilkini seçebiliyorum
        font-weight: bold;
      }
      p:last-child {
        p deki ilk çocuktan sonraki p çocuğu yani last child
        background-color: red;
      }*/

      /*li:nth-child(3) {
        li ul içinde bulunan listelerden nth-child(3) diyerel listedeki 3.öğe için zemin rengini kırmızı yaparım buna nokta atışı seçim gibi
        background-color: red;
      }
      li:nth-child(2) {
        background-color: blue;
      }*/
      /* li:nth-child(odd) {
        listemdeki çocukların biri giri zemin rengine diğeri normal zemin rengine sahip olsun derken nth-child(odd) çocukları tekli sayılarda gri zemin seç der eğer parantez içine (even) yazmış olsaydım çiftli sayıları seçerdi sayılarda derken listede yukarından aşşağı saydığımızda 1,2,3,4 tekli derken ilki ve üçüncüyü alır çifti derken ikinci ve dördüncü liste elemanını alır
        background-color: gray;
      }*/

      /*butonumun zemin rengini kırmızı yaparız ama button:hover dersem imcelim buton üzerine geldiğinde kırmızı olur
      button:hover {
        background-color: red;
      }
     imcelim input üzerine gelince mavi olucak ama ben tıkladığımda mavi olsun istersem focus yazarım 
      input:focus {
        background-color: blue;
      }*/
      /*h2 başlığına before yani önce bir eleman ve after sonra bir eleman ekleyebilirim alıntıların afterına kime ait olduğunu belirtmek için kullanılabilir örnek olarak başka şeyler de olabilir
      h2::before {
        content: 😀;
      }
      h2::after {
        content: 🥹;
      }*/
      p:not(.special) {
        /*special classın dışında olanları gri yap dedik yani p:not olmayan ne olmayan special classına sahip olmayanları gri yap*/
        background-color: gray;
      }
    </style>
