<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS dersleri metin hizalama</title>
    <style>
      /*text-align metin hizalar ortaya sona başa gibi*/
      /*  text-transform: uppercase; uppercase vererek tüm harflerimi büyük olacak şekilde işaretlemiş oldum birde lower var buda harfleri tamamen küçük yazar capitalize buda en az bir harfin büyük olmasını sağlar yani her kelimenin ilk harfini büyük yapar*/
      /*text-decoration: underline; yazının altını çizer underline yerine kine-through dersem direk yazının üstünü çizer overline var buda yazının hemen bir üstünü çizicek*/
      /*text-decoration-color: brown; yazının altını üstünü çizdiğimiz çizgilere renk verir*/
      p {
        background-color: aqua;
        text-align: center;
        text-transform: capitalize;
        text-decoration: underline;
        text-decoration-color: brown;
      }
    </style>
  </head>
  <body>
    <p>bu bir deneme metnidir</p>
  </body>
</html>
