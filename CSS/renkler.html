<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS dersleri renkler</title>
    <style>
      /* p { ön tanımlı renkler
        background-color: red;
      }*/
      /* p{ RGB kullanımı 0 ile 255 arasında red, green, blue için 0 ile 255 sayıları arasından değer vererek bu üç rengi karıştır anlamına gelir
        background-color: rgb(red, green, blue);
      }*/
      /*hexadecimal ile renklendirme burada 6 haneli bir sayı yazop başına '#' bu işareti koyarak bir renk olduğunu belirtiriz en sık kullanılan hexadecimaldir
      p {
        background-color: #956389;
      }*/

      /*HSL (HUE, saturation, lightness) renk, doygunluk,aydınlık vererek bir renk üretilebilir
      p {
        background-color: hsl(200, 40%, 70%);
      }*/
      /*RGBA ile yani alpha ile oluşturduğumuz rengin opaklığını verebiliyoruz aynısını hsl ilede yapılabilir
      p {
        background-color: rgba(40, 60, 70, 0.5);
      }*/
    </style>
  </head>
  <body>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Modi, eius
      laudantium nam non, sunt repellendus doloribus consequatur corporis quasi
      dolores tempora voluptatum nisi quaerat ratione! Eaque aspernatur
      laboriosam impedit ut.
    </p>
  </body>
</html>
