<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF=8" />
    <!--burada utf-8 yazması türkçe karakterleri kullanacağımızı belirtmek için-->
    <meta name="viewprt" content="width=device-width, initial-scale=1.0" />
    <!--viewport kısmı html dosyamızın tarayıcıda nasıl görünüceğini demek device-width html dosyasını açan cihazın genişliği ile aynı olsun demek-->
    <title>HTML dersleri-ul listeleme</title>
  </head>
  <body>
    <ul type="disc">
      <!--ul ile listeledik li ile liste elamanlarını yazdık varsayılan olarak disc tipi yani siyah içi dolu yuvarlak şekilde sayfada sıralanır istersek bunu ul içinde type= diyip circle dersek içi boş yuvarlak square içi dolu kare olur -->
      <li>liste elemanı 1</li>
      <li>liste elemanı 2</li>
      <li>liste elemanı 3</li>
      <li>liste elemanı 4</li>
    </ul>

    <ul>
      <!--bu örnekte iç içe listeleme yapabileceğimizi görmüş olduk-->
      <li>sebzeler</li>
      <ul>
        <li>patlıcan</li>
        <li>biber</li>
      </ul>
      <li>meyveler</li>
      <ul>
        <li>elma</li>
        <li>ayva</li>
      </ul>
      <li>meyve suları</li>
      <ul>
        <li>şeftali aromalı</li>
        <li>vişne aromalı</li>
      </ul>
      <li>et çeşitleri</li>
      <ul>
        <li>kırmızı et</li>
        <li>beyaz et</li>
      </ul>
    </ul>
  </body>
</html>
