<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF=8" />
    <!--burada utf-8 yazması türkçe karakterleri kullanacağımızı belirtmek için-->
    <meta name="viewprt" content="width=device-width, initial-scale=1.0" />
    <!--viewport kısmı html dosyamızın tarayıcıda nasıl görünüceğini demek device-width html dosyasını açan cihazın genişliği ile aynı olsun demek-->
    <title>HTML dersleri-tablo gövdeleri</title>
  </head>
  <body>
    <table border="1">
      <caption>
        çalışanlar listesi
      </caption>
      <thead>
        <!--tablo başlığı aynı bir sayfa düzeni gibi-->
        <tr>
          <th>Kimlik</th>
          <th>İsim</th>
          <th>Soyisim</th>
          <th>Maaş</th>
        </tr>
      </thead>
      <tbody>
        <!--tablo gövdesi aynı bir sayfa düzeni gibi-->
        <tr>
          <td>999</td>
          <td>Ahmet</td>
          <td>Çakır</td>
          <td>10 TL</td>
        </tr>
        <tr>
          <td>999</td>
          <td>Ahmet</td>
          <td>Çakır</td>
          <td>10 TL</td>
        </tr>
        <tr>
          <td>999</td>
          <td>Ahmet</td>
          <td>Çakır</td>
          <td>10 TL</td>
        </tr>
      </tbody>
      <tfoot>
        <!--tablo alt kısmı aynı bir sayfa düzeni gibi-->
        <tr>
          <th colspan="3">toplam maaş</th>
          <!--colspan 3 diyerek tabloda sütun olarak 3 lük alan kapladı-->
          <th>40 TL</th>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
