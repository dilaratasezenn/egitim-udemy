<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF=8" />
    <!--burada utf-8 yazması türkçe karakterleri kullanacağımızı belirtmek için-->
    <meta name="viewprt" content="width=device-width, initial-scale=1.0" />
    <!--viewport kısmı html dosyamızın tarayıcıda nasıl görünüceğini demek device-width html dosyasını açan cihazın genişliği ile aynı olsun demek-->
    <title>HTML dersleri -videolar</title>
  </head>
  <body>
    <video controls width="400" height="300">
      <source src="video/minivideo.mp4" type="video/mp4" />
    </video>
    <!--video tagı içine controls eklemezsek video çalışmaz bir resim gibi gözükebilir yani controls eklediğimizde durdurma ses kısma gibi özellikleri kullanabiliriz-->
  </body>
</html>
