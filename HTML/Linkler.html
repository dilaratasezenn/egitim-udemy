<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF=8" />
    <!--burada utf-8 yazması türkçe karakterleri kullanacağımızı belirtmek için-->
    <meta name="viewprt" content="width=device-width, initial-scale=1.0" />
    <!--viewport kısmı html dosyamızın tarayıcıda nasıl görünüceğini demek device-width html dosyasını açan cihazın genişliği ile aynı olsun demek-->
    <title>HTML dersleri - bağlantılar</title>
  </head>
  <body>
    <a href="https://www.google.com/">linke git</a
    ><!--href içine link yazılır sayfada linke git yazısına tıkladığımızda linke gider-->
    <a target="_blank" href="https://www.google.com/">google git</a
    ><!--target diyip _blank dediğimizde yeni sekmede açar-->
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolorum
      aspernatur incidunt sunt
      <a href="https://www.google.com/">buraya tıklayın</a> assumenda maxime a
      reprehenderit eius illum corporis quia ratione hic eligendi, sapiente
      nemo! Qui cumque ducimus molestiae blanditiis?
    </p>
    <!--bu şekilde de paragraf içinde bir kelimeyi link haline getirdik-->
  </body>
</html>
