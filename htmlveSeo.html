<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF=8" />
    <!--burada utf-8 yazması türkçe karakterleri kullanacağımızı belirtmek için-->
    <meta name="viewprt" content="width=device-width, initial-scale=1.0" />
    <!--viewport kısmı html dosyamızın tarayıcıda nasıl görünüceğini demek device-width html dosyasını açan cihazın genişliği ile aynı olsun demek-->
    <title>HTML dersleri- html ve SEO</title>
    <!--site başlığı önemli seo için-->
    <meta
      name="description"
      content="görkemli yazılım ile öğrendiğim web sitesi"
    />
    <!--web sitesinin açıklaması olucak bu da seo için önemli-->
    <meta name="keywords" content="Html, görkemli yazılım, öğrenmek" />
    <!--bu şekilde de anahtar kelimeler giriyoruz-->
  </head>
  <body>
    <h1>başlık 1</h1>
    <!--bir sayfada h1 den bir tane olmalı 4 tane olması hatalı bir tane büyük başlık olmalı bu seo uyumlu bir davranış--->
    <h2>başlık 2</h2>
    <h3>başlık 3</h3>
    <h4>başlık 4</h4>

    <a href="https://www.google.com/"></a
    ><!--sitemize koyacağımız linklerin güvenliği ve doğruluğundan sorumluyuz mesela google linki okunaklı bir link çok karışık bir link değil buda bizi seoda olumlu etkiler-->

    <img
      src="img/vangogh.webp"
      alt=""
      width="400"
      height="300"
    /><!--bir resim eklediğmizde mutlaka alt kısmını doldurmalıyız buraya düzgün bir açıklama yazılmalı mesela van goghun yıldızlı gece resmi bu açıklamalar da seo için önemli -->
  </body>
  <!--seo apayrı bir konu olsada bunlara dikkat edilmeli-->
</html>
